<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herald</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Herald</h1>
      <div id="connection-bar">
        <input type="text" id="hub-address" value="herald.local:8765" />
        <button id="connect-btn" onclick="toggleConnect()">Connect</button>
        <span id="connection-status" class="status disconnected">Disconnected</span>
      </div>
    </header>

    <main>
      <section id="setup-panel">
        <h2>Setup</h2>
        <div class="setup-row">
          <label>Game Mode</label>
          <select id="game-mode" onchange="onGameModeChange()">
            <option value="clockwise">Clockwise (Generic)</option>
            <option value="clockwise_pass">Clockwise with Passing</option>
            <option value="eclipse_simple">Eclipse — Simple</option>
            <option value="eclipse_advanced">Eclipse — Advanced</option>
            <option value="ti">Twilight Imperium</option>
          </select>
        </div>
        <div class="setup-row">
          <label>Players</label>
          <span id="player-count">0 boxes connected</span>
        </div>
        <div class="setup-row" id="first-player-row" style="display:none">
          <label>First Player</label>
          <select id="first-player"></select>
        </div>
        <div class="setup-row" id="eclipse-mode-row" style="display:none">
          <label>Reaction Cards</label>
          <input type="checkbox" id="eclipse-reaction-cards" />
          <span class="hint">Enforce passing via RFID tap</span>
        </div>
        <div class="setup-row" id="ti-speaker-row" style="display:none">
            <label>Speaker</label>
            <select id="ti-speaker"></select>
            </div>
        <button id="ti-learn-tags-btn" style="display:none" onclick="startTagLearning(buildTiTagQueue(), 'Learn TI Strategy Tags')">Learn Strategy Tags</button>
        <button id="ti-learn-faction-tags-btn" style="display:none" onclick="startTagLearning(buildTiFactionTagQueue(), 'Learn TI Faction Tags')">Learn Faction Tags</button>
        <button id="eclipse-learn-faction-tags-btn" style="display:none" onclick="startTagLearning(buildEclipseFactionTagQueue(), 'Learn Eclipse Faction Tags')">Learn Faction Tags</button>
        <button id="set-factions-btn" style="display:none" onclick="startFactionScan()">Set Factions</button>
        <button onclick="addVirtualBox()">Add Virtual Box</button>
        <button id="start-btn" onclick="startGame()" disabled>Start Game</button>
      </section>

        <section id="table-section">
        <h2>Table</h2>
        <div id="table-container">
            <div id="table-surface">
            <span id="table-label">No game in progress</span>
            </div>
            <div id="box-positions"></div>
        </div>
        <div id="phase-controls" style="display:none; margin-top: 0.75rem;">
            <button onclick="advancePhase()">Advance Phase</button>
        </div>
        <div id="ti-undo-controls" style="display:none; margin-top: 0.75rem;">
            <button onclick="tiUndoStrategyPick(); render()">Undo Pick</button>
        </div>
        <div id="faction-scan-banner" style="display:none" class="faction-scan-banner">
          <span>Faction scan active — each player tap your faction tile/card on your own box</span>
          <button onclick="stopFactionScan()">Done</button>
        </div>
        <div id="ti-game-controls" style="display:none; margin-top:0.75rem; text-align:center;">
          <label style="font-size:0.85rem; color:#aaa;">
            <input type="checkbox" id="ti-mecatol-active" onchange="tiMecatolActiveChanged()" />
            Mecatol Rex controlled
          </label>
          <div style="margin-top:0.4rem;">
            <label style="font-size:0.85rem; color:#aaa;">Secondary:
              <select id="ti-secondary-mode" onchange="tiSecondaryModeChanged()" style="font-size:0.85rem;">
                <option value="fastest">Fastest</option>
                <option value="fast">Fast</option>
                <option value="standard" selected>Standard</option>
              </select>
            </label>
          </div>
        </div>
        </section>

      <section id="log-section">
        <h2>Event Log <button onclick="clearLog()">Clear</button></h2>
        <div id="log"></div>
      </section>

    </main>
    <div id="debug-bar" style="text-align:center; padding:0.5rem; opacity:0.3">
      <button onclick="toggleDebug()" style="font-size:0.7rem; background:none; border:none; color:#888; cursor:pointer">debug</button>
      <div id="debug-panel" style="display:none; margin-top:0.5rem">
        <button onclick="debugSkipPhase()">Skip Phase</button>
      </div>
    </div>
  </div>
    <div id="tag-learning-overlay" style="display:none">
    <div id="tag-learning-modal">
        <h2 id="tag-learning-title">Learn Tags</h2>
        <div id="tag-learning-prompt"></div>
        <div id="tag-learning-status"></div>
        <button onclick="simulateTagTap()">Simulate Tap</button>
        <button onclick="cancelTagLearning()">Cancel</button>
    </div>
    </div>
    <div id="rfid-dialog-overlay" style="display:none" onclick="closeRfidDialog()">
    <div id="rfid-dialog" onclick="event.stopPropagation()">
        <h2>Simulate RFID Tap</h2>
        <div id="rfid-dialog-list"></div>
        <button onclick="closeRfidDialog()">Cancel</button>
    </div>
    </div>

  <script src="app.js"></script>
</body>
</html>
